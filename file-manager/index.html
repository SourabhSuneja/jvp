<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>File Manager · JVP Teachers Portal</title>
<meta name="theme-color" content="#0f172a" />
<style>
/* ============================== THEME TOKENS ============================== */
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --input: #334155;
  --text: #f8fafc;
  --sub: #94a3b8;
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --success: #10b981;
  --danger: #ef4444;
  --warn: #f59e0b;
  --border: #334155;
  --rose: #e11d48;
  --teal: #14b8a6;
  --purple: #8b5cf6;
  --cyan: #06b6d4;
  --pink: #ec4899;
  --radius-lg: 18px;
  --radius-md: 13px;
  --radius-sm: 9px;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }
svg { display: block; flex-shrink: 0; }

#app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 720px;
  margin: 0 auto;
  background: var(--bg);
  position: relative;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
@media (min-width: 760px) {
  body { display: flex; justify-content: center; }
  #app { box-shadow: 0 0 60px rgba(0,0,0,0.35); }
}

/* ============================== AUTH LOADING ============================== */
#authLoading {
  height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; color: var(--sub); font-size: 14px;
}

/* ============================== SPINNER ============================== */
.spinner {
  width: 34px; height: 34px; border-radius: 50%;
  border: 3px solid rgba(99,102,241,0.2); border-top-color: var(--primary);
  animation: spin 0.8s linear infinite;
}
.spinner-sm { width: 18px; height: 18px; border-width: 2.5px; }
.spinner-white { border-color: rgba(255,255,255,0.3); border-top-color: #fff; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================== HEADER ============================== */
.header { background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.header-row { display: flex; align-items: center; padding: 14px 16px; gap: 10px; }
.icon-btn {
  display: inline-flex; align-items: center; justify-content: center;
  background: none; border: none; color: var(--text); padding: 6px; border-radius: 10px;
  transition: background 0.15s;
}
.icon-btn:hover { background: rgba(255,255,255,0.06); }
.icon-btn-fill { background: var(--input); padding: 9px; }
.icon-btn-fill:hover { background: #3d4d68; }
.header-titles { flex: 1; min-width: 0; }
.header-title { font-size: 17px; font-weight: 700; color: var(--text); }
.header-sub { font-size: 11.5px; color: var(--rose); margin-top: 2px; font-weight: 600; }

.search-bar { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--card); border-top: 1px solid var(--border); color: var(--sub); }
.search-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 14.5px; height: 36px; }
.search-input::placeholder { color: var(--sub); }
.icon-btn-sm { background: none; border: none; color: var(--sub); padding: 6px; border-radius: 8px; display: inline-flex; }
.icon-btn-sm:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.link-btn { background: none; border: none; color: var(--primary); font-weight: 700; font-size: 13.5px; padding: 6px 4px; }

/* ============================== BREADCRUMB ============================== */
.breadcrumb {
  display: flex; align-items: center; gap: 3px; overflow-x: auto;
  padding: 9px 16px; background: var(--card); border-bottom: 1px solid var(--border);
  flex-shrink: 0; white-space: nowrap; color: var(--sub);
}
.breadcrumb::-webkit-scrollbar { display: none; }
.bc-seg { background: none; border: none; color: var(--sub); font-size: 12.5px; font-weight: 500; padding: 3px; }
.bc-seg:disabled { color: var(--text); font-weight: 700; cursor: default; }
.bc-active { color: var(--text); font-weight: 700; }

/* ============================== CONTEXT BAR ============================== */
.ctx-bar {
  display: flex; align-items: center; gap: 7px; padding: 9px 16px;
  background: rgba(99,102,241,0.06); border-bottom: 1px solid rgba(99,102,241,0.13);
  flex-shrink: 0; color: var(--primary);
}
.ctx-text { flex: 1; font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ctx-badge { background: rgba(99,102,241,0.18); border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
.ctx-refresh { color: var(--sub); }
.new-folder-btn {
  display: flex; align-items: center; gap: 4px; background: rgba(245,158,11,0.12);
  border: none; color: var(--warn); padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 700;
}
.new-folder-btn:hover { background: rgba(245,158,11,0.2); }

/* ============================== OP TOAST ============================== */
.op-toast {
  position: absolute; top: 96px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 10px; background: var(--card);
  padding: 11px 20px; border-radius: 24px; border: 1px solid var(--border);
  font-size: 13.5px; font-weight: 600; color: var(--text); z-index: 60;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

/* ============================== LIST ============================== */
.list-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.center-fill { height: 100%; display: flex; align-items: center; justify-content: center; }
.card-list { padding: 14px 16px 110px; display: flex; flex-direction: column; gap: 10px; }
.list-footer { display: flex; justify-content: center; padding: 18px 0; }

.empty-wrap {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 10px; padding: 60px 32px 0; color: var(--border); text-align: center;
}
.empty-title { color: var(--text); font-size: 16.5px; font-weight: 600; }
.empty-sub { color: var(--sub); font-size: 13.5px; }

/* ============================== FOLDER CARD ============================== */
.folder-card {
  display: flex; align-items: center; gap: 12px; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--radius-md); padding: 13px 14px;
  cursor: pointer; transition: transform 0.12s, border-color 0.15s, background 0.15s;
  position: relative;
}
.folder-card:hover { border-color: #3d4d68; background: #233044; }
.folder-card:active { transform: scale(0.99); }
.folder-card-virtual { border-style: dashed; border-color: rgba(245,158,11,0.35); }
.folder-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.folder-info { flex: 1; min-width: 0; }
.folder-name { font-size: 15.5px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.folder-sub { font-size: 12px; color: var(--sub); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.vf-badge { background: rgba(245,158,11,0.13); color: var(--warn); border-radius: 6px; padding: 2px 7px; font-size: 9.5px; font-weight: 700; flex-shrink: 0; }
.count-badge { background: rgba(99,102,241,0.16); color: var(--primary); border-radius: 10px; padding: 3px 9px; font-size: 11.5px; font-weight: 700; flex-shrink: 0; }
.folder-more { color: var(--sub); flex-shrink: 0; }
.chev { color: var(--sub); display: inline-flex; flex-shrink: 0; }

/* ============================== FILE CARD ============================== */
.file-card {
  display: flex; align-items: center; gap: 12px; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 13px;
  cursor: pointer; transition: border-color 0.15s, background 0.15s;
}
.file-card:hover { border-color: #3d4d68; background: #233044; }
.file-icon { width: 44px; height: 44px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.file-info { flex: 1; min-width: 0; }
.file-name { font-size: 14.5px; font-weight: 600; color: var(--text); margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.type-badge { padding: 2px 7px; border-radius: 6px; font-size: 10.5px; font-weight: 700; }
.meta-text { font-size: 11.5px; color: var(--sub); }
.file-more { color: var(--sub); flex-shrink: 0; background: var(--input); border-radius: 8px; padding: 6px; }
.file-more:hover { background: #3d4d68; }

/* ============================== FAB ============================== */
.fab {
  position: absolute; bottom: 28px; right: 22px;
  display: flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; border: none; border-radius: 28px; padding: 14px 22px;
  font-size: 14.5px; font-weight: 700;
  box-shadow: 0 8px 22px rgba(99,102,241,0.45);
  transition: transform 0.15s, box-shadow 0.15s; z-index: 40;
}
.fab:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(99,102,241,0.55); }
.fab:active { transform: translateY(0); }

/* ============================== MODAL / OVERLAY (generic) ============================== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 200;
  animation: fadeIn 0.15s ease;
}
.modal-overlay-bottom { align-items: flex-end; padding: 0; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.confirm-box, .rename-box {
  background: var(--card); border-radius: var(--radius-lg); padding: 24px;
  width: 100%; max-width: 380px; border: 1px solid var(--border);
  animation: popIn 0.16s ease;
}
@keyframes popIn { from { transform: scale(0.96) translateY(6px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.confirm-title, .rename-title { font-size: 18px; font-weight: 700; color: var(--text); margin: 0; }
.confirm-msg { font-size: 13.5px; color: var(--sub); margin: 10px 0 20px; line-height: 1.5; white-space: pre-line; }
.rename-hint { font-size: 13px; color: var(--sub); margin: 6px 0 18px; line-height: 1.5; }
.rename-header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.icon-chip { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.rename-input, .upload-input {
  width: 100%; height: 48px; border-radius: 12px; background: var(--bg);
  border: 1px solid var(--primary); padding: 0 14px; color: var(--text); font-size: 15px;
  margin-bottom: 20px; outline: none;
}
.rename-input:focus, .upload-input:focus { box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }

.modal-actions { display: flex; gap: 12px; }
.btn { flex: 1; height: 48px; border-radius: 12px; border: none; font-size: 14.5px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s, background 0.15s; }
.btn:disabled { opacity: 0.55; cursor: default; }
.btn-secondary { background: var(--input); color: var(--text); flex: 1; }
.btn-secondary:hover { background: #3d4d68; }
.btn-primary { background: var(--primary); color: #fff; flex: 2; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-danger { background: var(--danger); color: #fff; flex: 2; }
.btn-danger:hover { background: #dc2626; }

/* ============================== UPLOAD SHEET ============================== */
.upload-sheet {
  background: var(--card); border-radius: 24px 24px 0 0; padding: 10px 20px 36px;
  width: 100%; max-width: 720px; animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle { width: 38px; height: 4px; background: var(--border); border-radius: 3px; margin: 0 auto 16px; }
.upload-title { font-size: 19px; font-weight: 800; color: var(--text); margin: 0 0 16px; }
.asset-preview {
  display: flex; align-items: center; gap: 10px; background: rgba(99,102,241,0.08);
  border: 1px solid rgba(99,102,241,0.2); border-radius: 12px; padding: 12px; margin-bottom: 18px; color: var(--primary);
}
.asset-name { color: var(--text); font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 420px; }
.asset-meta { color: var(--sub); font-size: 12px; margin-top: 2px; }
.upload-label { font-size: 12.5px; font-weight: 600; color: var(--sub); margin-bottom: 8px; display: block; }
.upload-progress-wrap { margin-bottom: 16px; }
.progress-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12.5px; font-weight: 600; color: var(--sub); }
.progress-row span:last-child { color: var(--primary); }
.progress-track { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--primary); border-radius: 4px; width: 0%; transition: width 0.2s; }

/* ============================== ACTION SHEET ============================== */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: flex-end;
  justify-content: center; z-index: 200; animation: fadeIn 0.15s ease;
}
.action-sheet {
  background: var(--card); border-radius: 24px 24px 0 0; padding: 10px 14px 36px;
  width: 100%; max-width: 720px; animation: slideUp 0.2s ease;
}
.sheet-file-row { display: flex; align-items: center; gap: 12px; padding: 6px 6px 14px; }
.sheet-file-icon { width: 52px; height: 52px; border-radius: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sheet-file-name { font-size: 15px; font-weight: 700; color: var(--text); }
.sheet-file-meta { font-size: 11.5px; color: var(--sub); margin-top: 2px; }
.sheet-divider { height: 1px; background: var(--border); margin: 0 -14px 8px; }
.sheet-option {
  display: flex; align-items: center; gap: 14px; width: 100%; background: none; border: none;
  padding: 13px 6px; border-radius: 12px; text-align: left; color: var(--sub);
}
.sheet-option:hover { background: rgba(255,255,255,0.04); }
.sheet-opt-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sheet-opt-text { flex: 1; font-size: 15px; color: var(--text); font-weight: 600; }
.sheet-cancel {
  margin-top: 8px; width: 100%; background: var(--input); border: none; border-radius: 14px;
  padding: 13px; text-align: center; color: var(--sub); font-size: 15px; font-weight: 600;
}
.sheet-cancel:hover { background: #3d4d68; }

/* ============================== VIEWER ============================== */
.viewer-overlay { position: fixed; inset: 0; background: #000; z-index: 300; display: flex; }
.viewer { flex: 1; display: flex; flex-direction: column; position: relative; min-height: 0; }
.viewer-header {
  display: flex; align-items: center; gap: 10px; padding: 14px; background: rgba(0,0,0,0.6);
  flex-shrink: 0; position: relative; z-index: 5;
}
.viewer-icon-btn { color: #fff; background: none; }
.viewer-icon-btn:hover { background: rgba(255,255,255,0.12); }
.viewer-title { flex: 1; color: #fff; font-size: 14.5px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* image viewer */
.image-viewer { background: #000; }
.image-stage { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: grab; touch-action: none; }
.image-stage img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.05s linear; user-select: none; -webkit-user-drag: none; }
.image-info {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px; background: rgba(0,0,0,0.7);
  padding: 10px 16px; color: rgba(255,255,255,0.75); font-size: 12px;
}
.image-info .dot { color: rgba(255,255,255,0.3); }
.info-note { width: 100%; color: rgba(255,255,255,0.4); font-size: 11px; }

/* video viewer */
.video-viewer { background: #000; align-items: center; justify-content: center; }
.video-viewer video { width: 100%; height: 100%; object-fit: contain; background: #000; }
.video-buffer-spinner { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.video-overlay {
  position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between;
  transition: opacity 0.25s; background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, transparent 18%, transparent 70%, rgba(0,0,0,0.5) 100%);
}
.video-overlay.hidden { opacity: 0; pointer-events: none; }
.video-top { background: none; }
.video-transport { display: flex; align-items: center; justify-content: center; gap: 40px; }
.skip-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; color: #fff; }
.skip-btn span { font-size: 10.5px; font-weight: 700; }
.play-btn-lg {
  width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center; color: #fff; border: none;
}
.play-btn-lg:hover { background: rgba(255,255,255,0.25); }
.video-seek-row { display: flex; align-items: center; gap: 10px; padding: 0 16px 22px; }
.time-text { color: #fff; font-size: 12px; font-weight: 600; min-width: 38px; text-align: center; }
.seek-track { flex: 1; height: 32px; display: flex; align-items: center; position: relative; cursor: pointer; touch-action: none; }
.seek-track::before { content: ''; position: absolute; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.25); border-radius: 3px; }
.seek-fill { position: absolute; left: 0; height: 4px; background: var(--primary); border-radius: 3px; width: 0%; }
.seek-thumb { position: absolute; left: 0%; width: 14px; height: 14px; border-radius: 50%; background: var(--primary); transform: translateX(-50%); box-shadow: 0 2px 6px rgba(0,0,0,0.4); }

/* audio viewer */
.audio-viewer { background: var(--bg); }
.audio-art-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 40px; }
.audio-art {
  width: 170px; height: 170px; border-radius: 24px; background: rgba(236,72,153,0.1);
  border: 1px solid rgba(236,72,153,0.25); display: flex; align-items: center; justify-content: center;
  color: var(--pink); margin-bottom: 22px;
}
.audio-title { font-size: 18px; font-weight: 800; color: var(--text); text-align: center; margin-bottom: 6px; }
.audio-type { font-size: 12.5px; color: var(--sub); font-weight: 600; }
.audio-controls { background: var(--card); border-radius: 24px 24px 0 0; padding: 22px 24px 36px; flex-shrink: 0; }
.time-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 11.5px; color: var(--sub); font-weight: 600; }
.audio-controls .seek-track { margin-bottom: 16px; height: 28px; }
.audio-transport { display: flex; align-items: center; justify-content: center; gap: 38px; margin-bottom: 14px; }
.side-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; color: var(--sub); }
.side-btn span { font-size: 10.5px; font-weight: 700; }
.play-btn-pink {
  width: 60px; height: 60px; border-radius: 50%; background: var(--pink); border: none; color: #fff;
  display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 18px rgba(236,72,153,0.4);
}
.speed-btn { display: block; margin: 0 auto; background: var(--input); color: var(--text); border: none; padding: 7px 16px; border-radius: 18px; font-size: 13.5px; font-weight: 700; }
.speed-btn:hover { background: #3d4d68; }

/* pdf viewer */
.pdf-viewer { background: #0f172a; }
.pdf-frame-wrap { flex: 1; position: relative; }
.pdf-frame-wrap iframe { width: 100%; height: 100%; border: none; background: #fff; }
.pdf-loading {
  position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; background: #000; color: var(--sub); font-size: 13.5px; z-index: 2;
}

/* fallback viewer */
.fallback-wrap { flex: 1; background: #0f172a; display: flex; flex-direction: column; }
.fallback-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 0 30px; text-align: center; }
.fallback-text { color: var(--sub); font-size: 14px; line-height: 1.5; }
.ext-link-btn { background: var(--primary); color: #fff; border: none; padding: 13px 26px; border-radius: 12px; font-weight: 700; font-size: 14.5px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
.ext-link-btn:hover { background: var(--primary-dark); }

/* ============================== TOASTS ============================== */
#toastWrap { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 400; display: flex; flex-direction: column; gap: 8px; align-items: center; width: 90%; max-width: 420px; }
.toast {
  background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 18px; font-size: 13.5px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  opacity: 0; transform: translateY(-10px); transition: opacity 0.22s, transform 0.22s; max-width: 100%;
}
.toast-in { opacity: 1; transform: translateY(0); }
.toast-error { border-color: rgba(239,68,68,0.4); }
.toast-success { border-color: rgba(16,185,129,0.4); }

/* ============================== SCROLLBARS ============================== */
.list-scroll::-webkit-scrollbar, .breadcrumb::-webkit-scrollbar { width: 6px; height: 6px; }
.list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ============================== RESPONSIVE ============================== */
@media (max-width: 420px) {
  .header-title { font-size: 16px; }
  .fab span { display: none; }
  .fab { padding: 14px; border-radius: 50%; }
  .video-transport { gap: 26px; }
}
</style>
</head>
<body>
<div id="app">
  <div id="authLoading">
    <div class="spinner"></div>
    <div>Loading your workspace…</div>

      return (b / 1048576).toFixed(1) + ' MB';

  // ───────────────────────── CONFIRM DIALOG ─────────────────────────

    return new Promise((resolve) => {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML =
        '<div class="confirm-box">' +
          '<h3 class="confirm-title">' + esc(opts.title) + '</h3>' +
          '<p class="confirm-msg">' + esc(opts.message) + '</p>' +
          '<div class="modal-actions">' +
            '<button class="btn btn-secondary" data-act="cancel">' + esc(opts.cancelText || 'Cancel') + '</button>' +
            '<button class="btn ' + (opts.destructive ? 'btn-danger' : 'btn-primary') + '" data-act="ok">' + esc(opts.confirmText || 'Confirm') + '</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(overlay);
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) { overlay.remove(); resolve(false); }
      });
      overlay.querySelector('[data-act="cancel"]').addEventListener('click', () => { overlay.remove(); resolve(false); });
      overlay.querySelector('[data-act="ok"]').addEventListener('click', () => { overlay.remove(); resolve(true); });
    });
  }

  function showAlert(title, message) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML =
      '<div class="confirm-box">' +
        '<h3 class="confirm-title">' + esc(title) + '</h3>' +
        '<p class="confirm-msg">' + esc(message) + '</p>' +
        '<div class="modal-actions"><button class="btn btn-primary" data-act="ok" style="flex:1">OK</button></div>' +
      '</div>';
    document.body.appendChild(overlay);
    const close = () => overlay.remove();
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
    overlay.querySelector('[data-act="ok"]').addEventListener('click', close);
  }

      method: 'POST',

      body: JSON.stringify(body),

  // ───────────────────────── SUPABASE TABLE HELPERS ─────────────────────────
  async function listFoldersFromTable(contextKey, ownerId) {
    const { data: folders, error } = await supabase
      .from('virtual_folders')
      .select('id, name, context_key, created_at, updated_at')
      .eq('owner_id', ownerId)
      .eq('context_key', contextKey)
      .order('created_at', { ascending: true });
    if (error) throw error;
    if (!folders || !folders.length) return [];

    const folderIds = folders.map((f) => f.id);
    const { data: countRows, error: cErr } = await supabase
      .from('file_metadata')
      .select('virtual_folder_id')
      .in('virtual_folder_id', folderIds)
      .eq('upload_status', 1);
    if (cErr) throw cErr;

    const countMap = {};
    (countRows || []).forEach((r) => {
      if (r.virtual_folder_id) countMap[r.virtual_folder_id] = (countMap[r.virtual_folder_id] || 0) + 1;
    });

    return folders.map((f) => Object.assign({}, f, { file_count: countMap[f.id] || 0 }));
  }

  async function listFilesFromTable(opts) {
    const page = opts.page, perPage = opts.perPage;
    const from = (page - 1) * perPage;
    const to = from + perPage - 1;

    let q = supabase
      .from('file_metadata')
      .select(
        'id, title, mime_type, size_bytes, scope, grade, section, subject, teacher_id, teacher_name, created_at, updated_at, virtual_folder_id',
        { count: 'exact' }
      )
      .eq('scope', opts.scope)
      .eq('upload_status', 1)
      .order('created_at', { ascending: false })
      .range(from, to);

    if (opts.grade) q = q.eq('grade', opts.grade);
    if (opts.section) q = q.eq('section', opts.section);
    if (opts.subject) q = q.eq('subject', opts.subject);
    if (opts.virtualFolderId) q = q.eq('virtual_folder_id', opts.virtualFolderId);
    else if (opts.unassignedOnly) q = q.is('virtual_folder_id', null);
    if (opts.search && opts.search.trim()) q = q.ilike('title', '%' + opts.search.trim() + '%');

    const { data, error, count } = await q;
    if (error) throw error;

    return {
      files: data || [],
      total: count || 0,
      total_pages: Math.max(1, Math.ceil((count || 0) / perPage)),
    };
  }

  // ───────────────────────── AUTH / INIT ─────────────────────────
  async function boot() {
    try {
      const { data } = await supabase.auth.getSession();
      const session = data && data.session;
      if (!session) { window.location.href = LOGIN_REDIRECT; return; }
      state.session = session;
    } catch (e) {
      window.location.href = LOGIN_REDIRECT;
      return;
    }

    supabase.auth.onAuthStateChange((event, session) => {
      if (!session) window.location.href = LOGIN_REDIRECT;
      else state.session = session;
    });

    fetchUploadConfig();
    await initUser();
    renderApp();
    loadScreen(1);
  }

  async function fetchUploadConfig() {
    try {
      const res = await fetch(UPLOAD_CONFIG_URL);
      if (res.ok) state.uploadConfig = await res.json();
    } catch (e) { /* fail open */ }
  }

  async function initUser() {
    const uid = state.session.user.id;
    try {
      const { data: adminRow } = await supabase.from('admins').select('id').eq('id', uid).maybeSingle();
      state.isAdmin = !!adminRow;
    } catch (e) { state.isAdmin = false; }

    try {
      let q = supabase.from('class_subject_assignments').select('class, subject');
      if (!state.isAdmin) q = q.eq('teacher_id', uid);
      const { data: rows } = await q;
      state.assignments = rows || [];
    } catch (e) { state.assignments = []; }
  }

  // ───────────────────────── CONTEXT KEY ─────────────────────────
  function getContextKey(screen) {
    if (!screen) return null;
    switch (screen.type) {
      case 'private': return 'private';
      case 'file_list':
        return ['fl', screen.scope, screen.grade || 'x', screen.section || 'x', screen.subject || 'x'].join(':');
      case 'vfolder': return screen.contextKey || null;
      default: return null;
    }
  }

  // ───────────────────────── SCREEN LOADERS ─────────────────────────
  async function loadScreen(pg) {
    pg = pg || 1;
    const screen = currentScreen();
    if (pg === 1) { state.loading = true; state.items = []; renderApp(); }
    else { state.loadingMore = true; renderList(); }
    try {
      switch (screen.type) {
        case 'root': await loadRoot(); break;
        case 'private': await loadFilesWithVFolders('private', null, null, null, pg); break;
        case 'grade': await loadGrade(screen.grade); break;
        case 'grade_common': await loadSubjectList('common', screen.grade, null); break;
        case 'grade_section': await loadSubjectList('section', screen.grade, screen.section); break;
        case 'file_list': await loadFilesWithVFolders(screen.scope, screen.grade, screen.section, screen.subject, pg); break;
        case 'vfolder': await loadVFolderContents(pg); break;
      }
    } catch (e) {
      showAlert('Error', 'Could not load content. Please try again.');
    } finally {
      state.loading = false;
      state.loadingMore = false;
      renderApp();
    }
  }

  async function loadRoot() {
    const grades = Array.from(new Set(state.assignments.map((a) => a.class.split('-')[0]))).sort((a, b) => +a - +b);
    const folders = [
      { _itemType: 'folder', id: 'private', type: 'special', name: 'Private', subtitle: 'Your personal files', iconName: 'lock', color: 'var(--rose)' },
    ].concat(grades.map((g) => ({ _itemType: 'folder', id: 'grade-' + g, type: 'grade', grade: g, name: 'Class ' + g, subtitle: 'Common & sections', iconName: 'school', color: 'var(--primary)' })));
    state.items = folders;
  }

  async function loadGrade(grade) {
    const filtered = state.assignments.filter((a) => a.class.split('-')[0] === grade);
    const sections = Array.from(new Set(filtered.map((a) => a.class.split('-').slice(1).join('-')))).sort();
    const folders = [
      { _itemType: 'folder', id: 'common', type: 'common', name: 'Common', subtitle: 'All sections · Shared resources', iconName: 'people', color: 'var(--warn)' },
    ].concat(sections.map((sec) => ({ _itemType: 'folder', id: 'sec-' + grade + '-' + sec, type: 'section', section: sec, name: grade + '-' + sec, subtitle: 'Section-specific files', iconName: 'folder', color: 'var(--teal)' })));
    state.items = folders;
  }

  async function loadSubjectList(scope, grade, section) {
    const assignedSubjects = scope === 'common'
      ? state.assignments.filter((a) => a.class.split('-')[0] === grade).map((a) => a.subject)
      : state.assignments.filter((a) => a.class === grade + '-' + section).map((a) => a.subject);

    let q = supabase.from('file_metadata').select('subject').eq('scope', scope).eq('grade', grade).eq('upload_status', 1);
    if (section) q = q.eq('section', section);
    const { data, error } = await q;
    if (error) throw error;

    const fileSubjects = (data || []).map((f) => f.subject).filter(Boolean);
    const allSubjects = Array.from(new Set(assignedSubjects.concat(fileSubjects))).sort();
    const countMap = {};
    (data || []).forEach((f) => { if (f.subject) countMap[f.subject] = (countMap[f.subject] || 0) + 1; });

    state.items = allSubjects.map((sub) => ({
      _itemType: 'folder', id: 'subj-' + sub, type: 'subject', subject: sub,
      name: sub, subtitle: scope === 'common' ? 'Common resource' : 'Section file',
      iconName: 'book', color: 'var(--primary)', count: countMap[sub] || 0,
    }));
  }

  async function loadFilesWithVFolders(scope, grade, section, subject, pg) {
    const contextKey = getContextKey({ type: scope === 'private' ? 'private' : 'file_list', scope, grade, section, subject });

    const [folders, res] = await Promise.all([
      pg === 1 ? listFoldersFromTable(contextKey, state.session.user.id) : Promise.resolve([]),
      listFilesFromTable({ scope, grade, section, subject, unassignedOnly: true, search: state.searchQuery, page: pg, perPage: PER_PAGE }),
    ]);

    const vfolderItems = folders.map((vf) => ({
      _itemType: 'vfolder', _isVirtual: true,
      id: vf.id, name: vf.name, iconName: 'folderOpen', color: 'var(--warn)',
      subtitle: (vf.file_count || 0) + ' file' + ((vf.file_count || 0) !== 1 ? 's' : ''),
      count: vf.file_count || 0,
      _vfolderId: vf.id, _contextKey: contextKey,
      _parentScope: scope, _parentGrade: grade, _parentSection: section, _parentSubject: subject,
    }));

    const unassigned = res.files.map((f) => Object.assign({ _itemType: 'file' }, f));

    if (pg === 1) state.items = vfolderItems.concat(unassigned);
    else state.items = state.items.concat(unassigned);

    state.totalFiles = res.total;
    state.page = pg;
    state.hasMore = pg < res.total_pages;
  }

  async function loadVFolderContents(pg) {
    const sc = currentScreen();
    const res = await listFilesFromTable({
      scope: sc.parentScope, grade: sc.parentGrade, section: sc.parentSection, subject: sc.parentSubject,
      virtualFolderId: sc.vfolderId, search: state.searchQuery, page: pg, perPage: PER_PAGE,
    });
    const files = res.files.map((f) => Object.assign({ _itemType: 'file' }, f));
    state.items = pg === 1 ? files : state.items.concat(files);
    state.totalFiles = res.total;
    state.page = pg;
    state.hasMore = pg < res.total_pages;
  }

  // ───────────────────────── NAVIGATION ─────────────────────────
  function pushScreen(scr) {
    state.navStack.push(scr);
    state.searchQuery = ''; state.showSearch = false;
    state.page = 1; state.items = []; state.hasMore = false;
    renderApp();
    loadScreen(1);
  }
  function popScreen() {
    state.navStack.pop();
    state.searchQuery = ''; state.showSearch = false;
    renderApp();
    loadScreen(1);
  }
  function goToBreadcrumb(i) {
    state.navStack = state.navStack.slice(0, i + 2);
    state.searchQuery = ''; state.showSearch = false;
    renderApp();
    loadScreen(1);
  }

  function handleFolderPress(item) {
    const screen = currentScreen();
    if (item._itemType === 'vfolder') {
      pushScreen({
        type: 'vfolder', vfolderId: item._vfolderId, name: item.name, contextKey: item._contextKey,
        parentScope: item._parentScope, parentGrade: item._parentGrade, parentSection: item._parentSection, parentSubject: item._parentSubject,
      });
      return;
    }
    if (item.id === 'private') { pushScreen({ type: 'private' }); return; }
    if (item.type === 'grade') { pushScreen({ type: 'grade', grade: item.grade }); return; }
    if (item.type === 'common') { pushScreen({ type: 'grade_common', grade: screen.grade }); return; }
    if (item.type === 'section') { pushScreen({ type: 'grade_section', grade: screen.grade, section: item.section }); return; }
    if (item.type === 'subject') {
      let scScope, scSection = null;
      if (screen.type === 'grade_common') scScope = 'common';
      if (screen.type === 'grade_section') { scScope = 'section'; scSection = screen.section; }
      pushScreen({ type: 'file_list', scope: scScope, grade: screen.grade || null, section: scSection, subject: item.subject });
    }
  }

  function handleFolderLongPress(item) {
    const screen = currentScreen();
    if (item._itemType === 'vfolder') {
      openFolderActionSheet(Object.assign({}, item, { _isVirtual: true }));
      return;
    }
    if (item.type !== 'subject') return;
    let scScope, scSection = null;
    if (screen.type === 'grade_common') scScope = 'common';
    if (screen.type === 'grade_section') { scScope = 'section'; scSection = screen.section; }
    openFolderActionSheet(Object.assign({}, item, { _isVirtual: false, _scope: scScope, _grade: screen.grade, _section: scSection }));
  }

  // ───────────────────────── SCREEN FLAGS ─────────────────────────
  function isFileScreen() { return ['private', 'file_list', 'vfolder'].includes(currentScreen().type); }
  function isSubjectScreen() { const t = currentScreen().type; return t === 'grade_common' || t === 'grade_section'; }

  function contextLabel() {
    const screen = currentScreen();
    switch (screen.type) {
      case 'root': return 'Your folders';
      case 'private': return 'Private files';
      case 'grade': return 'Class ' + screen.grade;
      case 'grade_common': return 'Class ' + screen.grade + ' · Common';
      case 'grade_section': return 'Class ' + screen.grade + ' · ' + screen.grade + '-' + screen.section;
      case 'vfolder': return screen.name;
      case 'file_list':
        if (screen.scope === 'private') return 'Private files';
        if (screen.scope === 'common') return 'Class ' + screen.grade + ' · Common · ' + screen.subject;
        return screen.grade + '-' + screen.section + ' · ' + screen.subject;
      default: return '';
    }
  }

  // ───────────────────────── RENDERING ─────────────────────────
  function renderApp() {
    root.innerHTML =
      renderHeader() +
      (!isRoot() ? renderBreadcrumb() : '') +
      renderContextBar() +
      renderOpToast() +
      '<div id="listScroll" class="list-scroll">' + renderListInner() + '</div>' +
      renderFAB();
    attachAppListeners();
  }

  function renderHeader() {
    const screen = currentScreen();
    const subtitle = state.isAdmin ? 'File Manager · Admin' : 'File Manager · Teacher';
    return (

        '<div class="header-row">' +
          '<button class="icon-btn" id="btnBack" aria-label="Back">' + icon(isRoot() ? 'close' : 'arrowBack', 22) + '</button>' +
          '<div class="header-titles">' +
            '<div class="header-title">File Manager</div>' +
            '<div class="header-sub">' + esc(subtitle) + '</div>' +
          '</div>' +
          '<button class="icon-btn icon-btn-fill" id="btnSearch" aria-label="Search">' + icon('search', 18) + '</button>' +
        '</div>' +

    const segs = breadcrumbs();

    segs.forEach((label, i) => {
      html += icon('chevronRight', 13) + '<button class="bc-seg ' + (i === segs.length - 1 ? 'bc-active' : '') + '" data-bc="' + i + '" ' + (i === segs.length - 1 ? 'disabled' : '') + '>' + esc(label) + '</button>';
    });

  function renderContextBar() {
    const fileScreen = isFileScreen();
    const subjScreen = isSubjectScreen();
    return (
      '<div class="ctx-bar">' +
        icon(fileScreen ? 'fileAttach' : 'folderOpen', 14) +
        '<span class="ctx-text">' + esc(contextLabel()) + '</span>' +

        (subjScreen ? '<button class="new-folder-btn" id="btnNewSubject">' + icon('plus', 13) + '<span>New Subject</span></button>' : '') +

  function renderOpToast() {
    if (!state.opBusy) return '';
    const label = state.opBusy === 'deleteFile' ? 'Deleting file…' : state.opBusy === 'deleteFolder' ? 'Deleting folder…' : 'Fetching link…';
    return '<div class="op-toast"><div class="spinner spinner-sm"></div><span>' + esc(label) + '</span></div>';
  }

  function renderListInner() {
    if (state.loading) return '<div class="center-fill"><div class="spinner"></div></div>';
    if (!state.items.length) return renderEmpty();
    const fileScreen = isFileScreen();
    let html = '<div class="card-list">';
    state.items.forEach((item) => {
      html += item._itemType === 'file' ? renderFileCard(item) : renderFolderCard(item);
    });
    html += '</div>';
    if (state.loadingMore) html += '<div class="list-footer"><div class="spinner spinner-sm"></div></div>';
    return html;

    const el = document.getElementById('listScroll');
    if (el) el.innerHTML = renderListInner();
    attachListListeners();
  }

    const title = fileScreen ? (state.searchQuery ? 'No matching files' : 'No files yet') : 'Nothing to show';

    return (
      '<div class="empty-wrap">' +
        icon(fileScreen ? 'cloudUpload' : 'folderOpen', 52, 1.4) +

    metaParts.push('<span class="meta-text">' + fmt.bytes(item.size_bytes) + '</span>');

      '<div class="file-card" data-id="' + esc(item.id) + '" data-kind="file">' +

          '<span style="color:' + vis.color + '">' + icon(vis.icon, 21) + '</span>' +
        '</div>' +
        '<div class="file-info">' +
          '<div class="file-name">' + esc(item.title) + '</div>' +

  // ───────────────────────── EVENT WIRING ─────────────────────────
  function attachAppListeners() {
    const back = document.getElementById('btnBack');
    if (back) back.addEventListener('click', () => { isRoot() ? (window.location.href = 'https://myjvp.in/teachers/') : popScreen(); });
    const search = document.getElementById('btnSearch');
    if (search) search.addEventListener('click', () => { state.showSearch = !state.showSearch; renderApp(); if (state.showSearch) focusSearch(); });
    const cancelSearch = document.getElementById('btnCancelSearch');
    if (cancelSearch) cancelSearch.addEventListener('click', () => { state.showSearch = false; state.searchQuery = ''; renderApp(); loadScreen(1); });
    const clearSearch = document.getElementById('btnClearSearch');
    if (clearSearch) clearSearch.addEventListener('click', () => { state.searchQuery = ''; renderApp(); focusSearch(); loadScreen(1); });
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        state.searchQuery = e.target.value;
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => loadScreen(1), 350);
      });
    }
    document.querySelectorAll('.bc-seg').forEach((b) => {
      b.addEventListener('click', () => goToBreadcrumb(parseInt(b.getAttribute('data-bc'), 10)));
    });
    const refresh = document.getElementById('btnRefresh');
    if (refresh) refresh.addEventListener('click', () => loadScreen(1));
    const newSubj = document.getElementById('btnNewSubject');
    if (newSubj) newSubj.addEventListener('click', () => openNewFolderModal());
    const upload = document.getElementById('btnUpload');
    if (upload) upload.addEventListener('click', () => triggerFilePicker());

    attachListListeners();
    setupInfiniteScroll();
  }

  function focusSearch() {
    setTimeout(() => { const el = document.getElementById('searchInput'); if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); } }, 0);
  }

  let longPressTimer = null;

  function attachListListeners() {
    document.querySelectorAll('.file-card').forEach((card) => {
      const id = card.getAttribute('data-id');
      const item = state.items.find((i) => String(i.id) === id);
      if (!item) return;
      card.addEventListener('click', (e) => {
        if (e.target.closest('[data-act="file-more"]')) return;
        openFile(item);
      });
    });
    document.querySelectorAll('[data-act="file-more"]').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        const item = state.items.find((i) => String(i.id) === id);
        if (item) openFileActionSheet(item);
      });
    });
    document.querySelectorAll('.folder-card').forEach((card) => {
      const id = card.getAttribute('data-id');
      const item = state.items.find((i) => String(i.id) === id);
      if (!item) return;
      card.addEventListener('click', (e) => {
        if (e.target.closest('[data-act="folder-more"]')) return;
        handleFolderPress(item);
      });
      let pressTimer = null;
      card.addEventListener('touchstart', () => { pressTimer = setTimeout(() => handleFolderLongPress(item), 450); });
      card.addEventListener('touchend', () => clearTimeout(pressTimer));
      card.addEventListener('touchmove', () => clearTimeout(pressTimer));
    });
    document.querySelectorAll('[data-act="folder-more"]').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        const item = state.items.find((i) => String(i.id) === id);
        if (item) handleFolderLongPress(item);
      });
    });
  }

  function setupInfiniteScroll() {
    const el = document.getElementById('listScroll');
    if (!el) return;
    el.addEventListener('scroll', () => {
      if (state.hasMore && !state.loadingMore && el.scrollTop + el.clientHeight > el.scrollHeight - 200) {
        loadScreen(state.page + 1);
      }
    });
  }

  // ───────────────────────── FILE OPEN / VIEWER ─────────────────────────
  async function openFile(file) {
    state.opBusy = 'fetchLink'; renderOpToastOnly();
    try {
      const res = await callEdge({ action: 'get_download_url', file_id: file.id });
      if (!res.ok) throw new Error(res.error || 'Failed to get link');
      const cat = getMimeCategory(file.mime_type, file.title);
      if (['image', 'video', 'audio', 'pdf'].includes(cat)) {
        openViewerModal({ url: res.download_url, mimeType: file.mime_type, title: file.title, size_bytes: file.size_bytes }, cat);
      } else {
        window.open(res.download_url, '_blank');
      }
    } catch (e) {
      showAlert('Error', e.message || 'Could not fetch download link.');
    } finally {
      state.opBusy = null; renderOpToastOnly();
    }
  }

  function renderOpToastOnly() {
    const headerArea = root.querySelector('.ctx-bar');
    const existing = root.querySelector('.op-toast');
    if (existing) existing.remove();
    if (state.opBusy && headerArea) headerArea.insertAdjacentHTML('afterend', renderOpToast());
  }

  // ───────────────────────── VIEWER MODAL ─────────────────────────
  let viewerCleanup = null;

  function closeViewer() {
    const overlay = document.getElementById('viewerOverlay');
    if (overlay) overlay.remove();
    if (viewerCleanup) { viewerCleanup(); viewerCleanup = null; }
    document.exitFullscreen && document.fullscreenElement && document.exitFullscreen().catch(() => {});
  }

  function openViewerModal(data, cat) {
    const overlay = document.createElement('div');
    overlay.className = 'viewer-overlay';
    overlay.id = 'viewerOverlay';
    document.body.appendChild(overlay);

    if (cat === 'image') renderImageViewer(overlay, data);
    else if (cat === 'video') renderVideoViewer(overlay, data);
    else if (cat === 'audio') renderAudioViewer(overlay, data);
    else if (cat === 'pdf') renderPdfViewer(overlay, data);
  }

  function viewerHeaderHtml(title, url, backIcon) {
    return (
      '<div class="viewer-header">' +
        '<button class="icon-btn viewer-icon-btn" id="viewerClose">' + icon(backIcon || 'close', 22) + '</button>' +
        '<div class="viewer-title">' + esc(title) + '</div>' +
        '<a class="icon-btn viewer-icon-btn" href="' + esc(url) + '" target="_blank" rel="noopener">' + icon('external', 19) + '</a>' +
      '</div>'
    );
  }

  function renderImageViewer(overlay, data) {
    overlay.innerHTML =
      '<div class="viewer image-viewer">' +
        viewerHeaderHtml(data.title, data.url) +
        '<div class="image-stage" id="imgStage">' +
          '<img id="imgEl" src="' + esc(data.url) + '" alt="' + esc(data.title) + '" />' +
        '</div>' +
        '<div class="image-info" id="imgInfo" style="display:none">' +
          '<span>' + fmt.bytes(data.size_bytes) + '</span><span class="dot">·</span><span>' + esc(data.mimeType || 'Image') + '</span>' +
          '<div class="info-note">Scroll / pinch to zoom · Double-click to reset</div>' +
        '</div>' +
      '</div>';

    document.getElementById('viewerClose').addEventListener('click', closeViewer);

    const stage = document.getElementById('imgStage');
    const img = document.getElementById('imgEl');
    const infoEl = document.getElementById('imgInfo');
    let scale = 1, originX = 0, originY = 0, panning = false, lastX = 0, lastY = 0;

    function applyTransform() {
      img.style.transform = 'translate(' + originX + 'px,' + originY + 'px) scale(' + scale + ')';
    }
    function resetTransform() { scale = 1; originX = 0; originY = 0; applyTransform(); }

    stage.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = -e.deltaY * 0.0015;
      scale = Math.min(5, Math.max(1, scale + delta * scale));
      if (scale === 1) { originX = 0; originY = 0; }
      applyTransform();
    }, { passive: false });

    stage.addEventListener('dblclick', resetTransform);

    stage.addEventListener('mousedown', (e) => {
      if (scale <= 1) return;
      panning = true; lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    function onMove(e) {
      if (!panning) return;
      originX += e.clientX - lastX; originY += e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      applyTransform();
    }
    function onUp() { panning = false; }

    // touch pinch
    let pinchStartDist = null, pinchStartScale = 1;
    stage.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        pinchStartDist = touchDist(e.touches);
        pinchStartScale = scale;
      } else if (e.touches.length === 1) {
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; panning = scale > 1;
      }
    });
    stage.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && pinchStartDist) {
        e.preventDefault();
        const dist = touchDist(e.touches);
        scale = Math.min(5, Math.max(1, pinchStartScale * (dist / pinchStartDist)));
        applyTransform();
      } else if (e.touches.length === 1 && panning) {
        originX += e.touches[0].clientX - lastX; originY += e.touches[0].clientY - lastY;
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        applyTransform();
      }
    }, { passive: false });
    stage.addEventListener('touchend', () => { pinchStartDist = null; panning = false; });

    let tapTimer = null;
    stage.addEventListener('click', (e) => {
      if (e.target === img) {
        clearTimeout(tapTimer);
        tapTimer = setTimeout(() => { infoEl.style.display = infoEl.style.display === 'none' ? 'flex' : 'none'; }, 180);
      }
    });

    function touchDist(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    viewerCleanup = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }

  function renderVideoViewer(overlay, data) {
    overlay.innerHTML =
      '<div class="viewer video-viewer" id="videoViewerRoot">' +
        '<video id="videoEl" src="' + esc(data.url) + '" playsinline autoplay></video>' +
        '<div class="video-buffer-spinner" id="videoBuffSpin" style="display:none"><div class="spinner"></div></div>' +
        '<div class="video-overlay" id="videoCtrl">' +
          '<div class="viewer-header video-top">' +
            '<button class="icon-btn viewer-icon-btn" id="viewerClose">' + icon('arrowBack', 20) + '</button>' +
            '<div class="viewer-title">' + esc(data.title) + '</div>' +
            '<button class="icon-btn viewer-icon-btn" id="btnFullscreen">' + icon('external', 18) + '</button>' +
          '</div>' +
          '<div class="video-transport">' +
            '<button class="skip-btn" id="vidSkipBack">' + icon('skipBack', 26) + '<span>10</span></button>' +
            '<button class="play-btn-lg" id="vidPlayPause">' + icon('pause', 38) + '</button>' +
            '<button class="skip-btn" id="vidSkipFwd">' + icon('skipFwd', 26) + '<span>10</span></button>' +
          '</div>' +
          '<div class="video-seek-row">' +
            '<span class="time-text" id="vidPos">0:00</span>' +
            '<div class="seek-track" id="vidSeekTrack"><div class="seek-fill" id="vidSeekFill"></div><div class="seek-thumb" id="vidSeekThumb"></div></div>' +
            '<span class="time-text" id="vidDur">0:00</span>' +
          '</div>' +
        '</div>' +
      '</div>';

    const video = document.getElementById('videoEl');
    const ctrl = document.getElementById('videoCtrl');
    const playBtn = document.getElementById('vidPlayPause');
    const seekTrack = document.getElementById('vidSeekTrack');
    const seekFill = document.getElementById('vidSeekFill');
    const seekThumb = document.getElementById('vidSeekThumb');
    const posEl = document.getElementById('vidPos');
    const durEl = document.getElementById('vidDur');
    const buffSpin = document.getElementById('videoBuffSpin');

    document.getElementById('viewerClose').addEventListener('click', closeViewer);
    document.getElementById('btnFullscreen').addEventListener('click', () => {
      const r = document.getElementById('videoViewerRoot');
      if (document.fullscreenElement) document.exitFullscreen();
      else r.requestFullscreen && r.requestFullscreen().catch(() => {});
    });

    let hideTimer = null;
    function resetHideTimer() {
      clearTimeout(hideTimer);
      ctrl.classList.remove('hidden');
      hideTimer = setTimeout(() => ctrl.classList.add('hidden'), 3500);
    }
    resetHideTimer();
    video.addEventListener('click', () => {
      if (ctrl.classList.contains('hidden')) { ctrl.classList.remove('hidden'); resetHideTimer(); }
      else { ctrl.classList.add('hidden'); clearTimeout(hideTimer); }
    });

    function togglePlay() {
      if (video.paused) video.play(); else video.pause();
      resetHideTimer();
    }
    playBtn.addEventListener('click', togglePlay);
    video.addEventListener('play', () => { playBtn.innerHTML = icon('pause', 38); });
    video.addEventListener('pause', () => { playBtn.innerHTML = icon('play', 38); });
    video.addEventListener('waiting', () => { buffSpin.style.display = 'flex'; });
    video.addEventListener('playing', () => { buffSpin.style.display = 'none'; });

    document.getElementById('vidSkipBack').addEventListener('click', () => { video.currentTime = Math.max(0, video.currentTime - 10); resetHideTimer(); });
    document.getElementById('vidSkipFwd').addEventListener('click', () => { video.currentTime = Math.min(video.duration || 0, video.currentTime + 10); resetHideTimer(); });

    video.addEventListener('loadedmetadata', () => { durEl.textContent = fmt.time(video.duration * 1000); });
    video.addEventListener('timeupdate', () => {
      if (!seeking) {
        posEl.textContent = fmt.time(video.currentTime * 1000);
        const pct = video.duration ? (video.currentTime / video.duration) * 100 : 0;
        seekFill.style.width = pct + '%';
        seekThumb.style.left = pct + '%';
      }
    });

    let seeking = false;
    function seekFromEvent(e) {
      const rect = seekTrack.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const pct = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
      return pct;
    }
    function startSeek(e) {
      seeking = true;
      const pct = seekFromEvent(e);
      seekFill.style.width = pct * 100 + '%';
      seekThumb.style.left = pct * 100 + '%';
      posEl.textContent = fmt.time(pct * (video.duration || 0) * 1000);
    }
    function moveSeek(e) {
      if (!seeking) return;
      const pct = seekFromEvent(e);
      seekFill.style.width = pct * 100 + '%';
      seekThumb.style.left = pct * 100 + '%';
      posEl.textContent = fmt.time(pct * (video.duration || 0) * 1000);
    }
    function endSeek(e) {
      if (!seeking) return;
      const pct = seekFromEvent(e);
      video.currentTime = pct * (video.duration || 0);
      seeking = false;
      resetHideTimer();
    }
    seekTrack.addEventListener('mousedown', startSeek);
    window.addEventListener('mousemove', moveSeek);
    window.addEventListener('mouseup', endSeek);
    seekTrack.addEventListener('touchstart', startSeek);
    seekTrack.addEventListener('touchmove', moveSeek, { passive: true });
    seekTrack.addEventListener('touchend', endSeek);

    viewerCleanup = () => { window.removeEventListener('mousemove', moveSeek); window.removeEventListener('mouseup', endSeek); video.pause(); };
  }

  async function deleteSubjectFolder(folder) {
    const subject = folder.name;
    const scope = folder._scope, grade = folder._grade, section = folder._section;
    const ok = await showConfirm({ title: 'Delete Subject Folder', message: 'Delete the folder "' + subject + '" and all its files? This cannot be undone.', confirmText: 'Delete All', destructive: true });
    if (!ok) return;
    state.opBusy = 'deleteFolder'; renderOpToastOnly();
    try {
      let pg = 1;
      while (true) {
        const body = { action: 'list', scope, grade, upload_status: 1, page: pg, per_page: 50, subject };
        if (section) body.section = section;
        const res = await callEdge(body);
        if (!res.ok) throw new Error(res.error);
        const files = res.files || [];
        if (!files.length) break;
        for (const f of files) await callEdge({ action: 'delete', file_id: f.id });
        if (pg >= ((res.pagination && res.pagination.total_pages) || 1)) break;
        pg++;
      }
      loadScreen(1);
    } catch (e) { showAlert('Error', e.message || 'Something went wrong.'); }
    finally { state.opBusy = null; renderOpToastOnly(); }
  }

  // ───────────────────────── UPLOAD ─────────────────────────
  function validateUpload(file, config) {
    if (!config) return null;
    const mime = file.type || '';
    const size = file.size || 0;
    if (config.allowed_mime_types && !config.allowed_mime_types.includes(mime)) {
      return 'File type "' + mime + '" is not allowed.\nAccepted: PDF, images, videos, Word, Excel, PowerPoint.';
    }
    if (size > config.general_max_bytes) {
      return 'File is too large (' + fmt.bytes(size) + ').\nMaximum allowed: ' + fmt.bytes(config.general_max_bytes) + '.';
    }
    const typeLimit = config.mime_limits ? config.mime_limits[mime] : null;
    if (typeLimit != null && size > typeLimit) {
      return 'File is too large for this type (' + fmt.bytes(size) + ').\nLimit for "' + mime + '": ' + fmt.bytes(typeLimit) + '.';
    }
    return null;
  }

        '</div>' +
        '<div class="modal-actions">' +
          '<button class="btn btn-secondary" id="uploadCancelBtn">Cancel</button>' +
          '<button class="btn btn-primary" id="uploadConfirmBtn">' + icon('cloudUpload', 16) + '<span>Upload</span></button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);

    const titleInput = document.getElementById('uploadTitleInput');
    const confirmBtn = document.getElementById('uploadConfirmBtn');
    const cancelBtn = document.getElementById('uploadCancelBtn');
    let uploading = false;

    titleInput.focus();
    cancelBtn.addEventListener('click', () => { if (!uploading) overlay.remove(); });

    confirmBtn.addEventListener('click', async () => {
      const title = titleInput.value.trim();
      if (!title || uploading) return;
      uploading = true;
      titleInput.disabled = true; cancelBtn.disabled = true;
      confirmBtn.innerHTML = '<div class="spinner spinner-sm spinner-white"></div>';
      document.getElementById('uploadProgressWrap').style.display = 'block';
      try {
        await confirmUpload(file, title, (pct) => {
          document.getElementById('uploadProgressFill').style.width = pct + '%';
          document.getElementById('uploadPct').textContent = pct + '%';
        });
        overlay.remove();
        loadScreen(1);
      } catch (e) {
        uploading = false;
        titleInput.disabled = false; cancelBtn.disabled = false;
        confirmBtn.innerHTML = icon('cloudUpload', 16) + '<span>Upload</span>';
        showAlert('Upload Failed', e.message || 'Something went wrong.');
      }
    });
  }

  async function confirmUpload(file, title, onProgress) {
    const sc = currentScreen();
    let scope, grade = null, section = null, subject = null, targetVfolderId = null;
    if (sc.type === 'private') { scope = 'private'; }
    else if (sc.type === 'file_list') { scope = sc.scope; grade = sc.grade; section = sc.section; subject = sc.subject; }
    else if (sc.type === 'vfolder') { scope = sc.parentScope; grade = sc.parentGrade; section = sc.parentSection; subject = sc.parentSubject; targetVfolderId = sc.vfolderId; }
    else { throw new Error('Navigate into a folder or subject first before uploading.'); }

    const urlRes = await callEdge({
      action: 'get_upload_url', title: title, filename: file.name,
      mime_type: file.type || null, size_bytes: file.size || null,
      scope, grade, section, subject, virtual_folder_id: targetVfolderId || null,
    });
    if (!urlRes.ok) throw new Error(urlRes.error);

    await uploadFileToStorage(urlRes.upload_url, file, onProgress);

    const confRes = await callEdge({ action: 'confirm_upload', file_id: urlRes.file_id });
    if (!confRes.ok) throw new Error(confRes.error);
  }

  function uploadFileToStorage(uploadUrl, file, onProgress) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) onProgress(Math.min(100, Math.round((e.loaded / e.total) * 100)));
      });
      xhr.addEventListener('load', () => {
        if (xhr.status >= 200 && xhr.status < 300) resolve();
        else reject(new Error('HTTP ' + xhr.status));
      });
      xhr.addEventListener('error', () => reject(new Error('Network error during upload')));
      xhr.open('PUT', uploadUrl);
      xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
      xhr.send(file);
    });
  }

  // ───────────────────────── HIDDEN FILE INPUT ─────────────────────────
  function setupFileInput() {
    const input = document.createElement('input');
    input.type = 'file';
    input.id = 'filePickerInput';
    input.style.display = 'none';
    input.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      handleFilePicked(file);
    });
    document.body.appendChild(input);
  }

  // ───────────────────────── ESCAPE KEY HANDLING ─────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    const viewer = document.getElementById('viewerOverlay');
    if (viewer) { closeViewer(); return; }
    const overlays = document.querySelectorAll('.modal-overlay, .sheet-overlay');
    if (overlays.length) overlays[overlays.length - 1].remove();
  });

  // ───────────────────────── STARTUP ─────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    setupFileInput();
    boot();
  });
})();
</script>
</body>
