<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>School File Manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #181c27;
    --panel:    #1e2333;
    --border:   #2a3047;
    --accent:   #4f72ff;
    --accent2:  #7c3aed;
    --success:  #22c55e;
    --warning:  #f59e0b;
    --danger:   #ef4444;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --mono:     'DM Mono', monospace;
    --sans:     'DM Sans', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    line-height: 1.6;
  }

  .app { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 56px;
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 16px; letter-spacing: -0.02em;
  }
  .logo svg { color: var(--accent); }

  .badge {
    display: inline-flex; align-items: center;
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    border-radius: 4px; padding: 1px 8px;
    font-family: var(--mono); font-size: 11px;
  }

  /* Session badge shown in header */
  #sessionBadge {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #sessionBadge .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  #sessionBadge.authed .dot { background: var(--success); }
  #sessionBadge.authed { color: var(--success); }

  .main { display: grid; grid-template-columns: 280px 1fr; }

  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 24px;
  }

  .section-label {
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .config-group { display: flex; flex-direction: column; gap: 8px; }

  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 3px; }

  input, select {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .content { display: flex; flex-direction: column; overflow: hidden; }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 24px;
    gap: 2px;
  }
  .tab {
    padding: 14px 18px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color .15s, border-color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .panel { display: none; padding: 24px; flex: 1; overflow-y: auto; }
  .panel.active { display: block; }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    margin-bottom: 20px;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 5%, transparent);
  }
  .upload-zone svg { color: var(--muted); margin-bottom: 12px; }
  .upload-zone p { color: var(--muted); font-size: 13px; }
  .upload-zone strong { color: var(--text); }
  #fileInput { display: none; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-full { margin-bottom: 12px; }

  .progress-wrap {
    display: none;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-top: 16px;
  }
  .progress-wrap.visible { display: block; }
  .progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; color: var(--muted); }
  .progress-bar-track { background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    width: 0%;
    transition: width .3s;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 7px; border: none;
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { opacity: .88; }
  .btn-ghost {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-danger { background: color-mix(in srgb, var(--danger) 15%, transparent); color: var(--danger); border: 1px solid color-mix(in srgb, var(--danger) 30%, transparent); }
  .btn-danger:hover { background: color-mix(in srgb, var(--danger) 25%, transparent); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  .action-row { display: flex; gap: 8px; margin-top: 16px; }

  .list-toolbar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .list-toolbar input { flex: 1; min-width: 180px; }
  .list-toolbar select { width: auto; }

  .file-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .file-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color .15s;
    animation: fadeIn .25s ease;
  }
  .file-card:hover { border-color: var(--accent); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .file-card-header { display: flex; align-items: flex-start; gap: 10px; }
  .file-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
  .file-title { font-weight: 500; font-size: 13px; color: var(--text); word-break: break-word; }
  .file-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .file-tags { display: flex; flex-wrap: wrap; gap: 4px; }

  .tag {
    display: inline-flex; align-items: center;
    font-size: 10px; font-family: var(--mono);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 6px;
    color: var(--muted);
  }

  .file-actions { display: flex; gap: 6px; margin-top: 2px; }

  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }
  .dot-pending { background: var(--warning); }
  .dot-done    { background: var(--success); }

  .pagination {
    display: flex; justify-content: center; align-items: center; gap: 8px;
    margin-top: 24px; font-size: 13px; color: var(--muted);
  }

  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    transform: translateY(20px);
    opacity: 0;
    pointer-events: none;
    transition: all .25s;
    z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  #toast.toast-ok    { border-color: var(--success); color: var(--success); }
  #toast.toast-err   { border-color: var(--danger);  color: var(--danger); }
  #toast.toast-info  { border-color: var(--accent);  color: var(--accent); }

  .empty {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }
  .empty svg { opacity: .3; margin-bottom: 12px; }

  /* Auth error banner */
  .auth-error {
    background: color-mix(in srgb, var(--danger) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--danger) 40%, transparent);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--danger);
    margin-bottom: 20px;
    display: none;
  }
  .auth-error.visible { display: block; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      School File Manager
    </div>
    <span class="badge">TEACHER PORTAL</span>
    <div id="sessionBadge">
      <span class="dot"></span>
      <span id="sessionLabel">Checking session…</span>
    </div>
  </header>

  <div class="main">

    <!-- Sidebar: File Scope only (no connection config needed) -->
    <aside>
      <div>
        <div class="section-label">File Scope</div>
        <div class="config-group">
          <div>
            <label>Scope</label>
            <select id="cfgScope" onchange="handleScopeChange()">
              <option value="private">🔒 Private</option>
              <option value="common">📚 Class Common</option>
              <option value="section" selected>📂 Section</option>
            </select>
          </div>
          <div id="gradeWrap">
            <label>Grade</label>
            <input id="cfgGrade" type="text" placeholder="e.g. 6" />
          </div>
          <div id="sectionWrap">
            <label>Section</label>
            <input id="cfgSection" type="text" placeholder="e.g. A1" />
          </div>
          <div id="subjectWrap">
            <label>Subject</label>
            <input id="cfgSubject" type="text" placeholder="e.g. English" />
          </div>
        </div>
      </div>
    </aside>

    <!-- Content -->
    <div class="content">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('upload', this)">↑ Upload</button>
        <button class="tab" onclick="switchTab('files', this)">≡ Files</button>
      </div>

      <!-- Upload panel -->
      <div id="panel-upload" class="panel active">

        <!-- Auth error (shown only if session is missing) -->
        <div class="auth-error" id="authError">
          ⚠ No active session found. Please log in through the main portal before using this page.
        </div>

        <!-- Drop zone -->
        <div class="upload-zone" id="dropZone"
             onclick="document.getElementById('fileInput').click()"
             ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p><strong>Drop a file here</strong> or click to browse</p>
          <p style="margin-top:4px;font-size:11px">PDFs, images, audio, video — any format</p>
        </div>
        <input type="file" id="fileInput" onchange="onFileChosen(this.files[0])" />

        <!-- Metadata form -->
        <div id="uploadForm" style="display:none">
          <div class="form-row">
            <div>
              <label>Display Title *</label>
              <input id="fldTitle" type="text" placeholder="e.g. Chapter 3 Notes" />
            </div>
            <div>
              <label>Chosen File</label>
              <input id="fldFilename" type="text" readonly style="opacity:.6" />
            </div>
          </div>

          <div class="action-row">
            <button class="btn btn-primary" id="btnUpload" onclick="startUpload()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
              Upload File
            </button>
            <button class="btn btn-ghost" onclick="clearUpload()">Cancel</button>
          </div>

          <!-- Progress -->
          <div class="progress-wrap" id="progressWrap">
            <div class="progress-info">
              <span id="progressLabel">Uploading…</span>
              <span id="progressPct">0%</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" id="progressBar"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Files panel -->
      <div id="panel-files" class="panel">
        <div class="list-toolbar">
          <input id="searchInput" type="text" placeholder="🔍  Search files…" oninput="debounceSearch()" />
          <select id="filterStatus" onchange="loadFiles(1)">
            <option value="">All statuses</option>
            <option value="1" selected>Uploaded</option>
            <option value="0">Pending</option>
          </select>
          <button class="btn btn-ghost" onclick="loadFiles(1)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
            Refresh
          </button>
        </div>

        <div id="fileGrid" class="file-grid"></div>
        <div class="pagination" id="paginationBar"></div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Rename modal -->
<div id="renameModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center">
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;width:360px;max-width:90vw">
    <div style="font-weight:600;margin-bottom:12px">Rename File</div>
    <input id="renameInput" type="text" placeholder="New display name" />
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-primary" onclick="confirmRename()">Save</button>
      <button class="btn btn-ghost" onclick="closeRename()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  Constants
// ─────────────────────────────────────────────────────────────────────────────
const EDGE_URL = 'https://ckltcwampaagyzneaznt.supabase.co/functions/v1/file-manager';
const SUPABASE_PROJECT_REF = 'ckltcwampaagyzneaznt';

// ─────────────────────────────────────────────────────────────────────────────
//  Session: retrieve JWT from Supabase's localStorage entry
//  Supabase stores the session under the key:
//    sb-<project-ref>-auth-token
// ─────────────────────────────────────────────────────────────────────────────
function getSessionToken() {
  try {
    // Primary key used by Supabase JS v2
    const key = `sb-${SUPABASE_PROJECT_REF}-auth-token`;
    const raw = localStorage.getItem(key);
    if (raw) {
      const parsed = JSON.parse(raw);
      return parsed?.access_token || null;
    }

    // Fallback: some integrations store it under a legacy key format
    const legacyKey = `supabase.auth.token`;
    const legacy = localStorage.getItem(legacyKey);
    if (legacy) {
      const parsed = JSON.parse(legacy);
      return parsed?.currentSession?.access_token || null;
    }

    // Fallback: search all localStorage keys for a Supabase-like session
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('sb-') && k.endsWith('-auth-token')) {
        const val = JSON.parse(localStorage.getItem(k));
        if (val?.access_token) return val.access_token;
      }
    }
  } catch (e) {
    console.warn('Could not read session from localStorage:', e);
  }
  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Session status UI
// ─────────────────────────────────────────────────────────────────────────────
function updateSessionUI() {
  const token = getSessionToken();
  const badge = document.getElementById('sessionBadge');
  const label = document.getElementById('sessionLabel');
  const authErr = document.getElementById('authError');

  if (token) {
    badge.classList.add('authed');
    // Decode just the payload to show the user's email if present
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      const email = payload.email || payload.sub || 'teacher';
      label.textContent = `Signed in as ${email}`;
    } catch {
      label.textContent = 'Session active';
    }
    authErr.classList.remove('visible');
  } else {
    badge.classList.remove('authed');
    label.textContent = 'No session';
    authErr.classList.add('visible');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────────────────────────────────────
let chosenFile = null;
let currentPage = 1;
let renameFileId = null;
let searchDebounce = null;

// ─────────────────────────────────────────────────────────────────────────────
//  Scope helpers
// ─────────────────────────────────────────────────────────────────────────────
function scopeCfg() {
  return {
    scope:   document.getElementById('cfgScope').value,
    grade:   document.getElementById('cfgGrade').value.trim() || null,
    section: document.getElementById('cfgSection').value.trim() || null,
    subject: document.getElementById('cfgSubject').value.trim() || null,
  };
}

// ─────────────────────────────────────────────────────────────────────────────
//  Edge function caller — token is auto-retrieved from session
// ─────────────────────────────────────────────────────────────────────────────
async function callEdge(body) {
  const token = getSessionToken();
  if (!token) {
    toast('No active session. Please log in through the main portal.', 'err');
    return null;
  }
  try {
    const res = await fetch(EDGE_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
      },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Unknown error');
    return data;
  } catch (e) {
    toast(e.message, 'err');
    return null;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  Utilities
// ─────────────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show toast-${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 3500);
}

function fileIcon(mimeType) {
  if (!mimeType) return '📄';
  if (mimeType.startsWith('video/')) return '🎬';
  if (mimeType.startsWith('audio/')) return '🎵';
  if (mimeType.startsWith('image/')) return '🖼️';
  if (mimeType === 'application/pdf') return '📕';
  if (mimeType.includes('word') || mimeType.includes('document')) return '📝';
  if (mimeType.includes('sheet') || mimeType.includes('excel')) return '📊';
  if (mimeType.includes('presentation') || mimeType.includes('powerpoint')) return '📊';
  if (mimeType.startsWith('text/')) return '📃';
  return '📦';
}

function fmtBytes(bytes) {
  if (!bytes) return '—';
  const units = ['B', 'KB', 'MB', 'GB'];
  let i = 0; let v = bytes;
  while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
  return `${v.toFixed(i > 0 ? 1 : 0)} ${units[i]}`;
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────────────────────────────
//  Scope sidebar
// ─────────────────────────────────────────────────────────────────────────────
function handleScopeChange() {
  const scope = document.getElementById('cfgScope').value;
  document.getElementById('gradeWrap').style.display   = scope === 'private' ? 'none' : '';
  document.getElementById('sectionWrap').style.display = scope === 'section' ? '' : 'none';
  document.getElementById('subjectWrap').style.display = scope === 'private' ? 'none' : '';
}
handleScopeChange();

// ─────────────────────────────────────────────────────────────────────────────
//  Tabs
// ─────────────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
  if (name === 'files') loadFiles(1);
}

// ─────────────────────────────────────────────────────────────────────────────
//  Upload flow
// ─────────────────────────────────────────────────────────────────────────────
function onDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
function onDragLeave()  { document.getElementById('dropZone').classList.remove('drag-over'); }
function onDrop(e)      { e.preventDefault(); onDragLeave(); if (e.dataTransfer.files[0]) onFileChosen(e.dataTransfer.files[0]); }

function onFileChosen(file) {
  if (!file) return;
  chosenFile = file;
  document.getElementById('uploadForm').style.display = 'block';
  document.getElementById('fldFilename').value = file.name;
  document.getElementById('fldTitle').value = file.name.replace(/\.[^.]+$/, '');
  document.getElementById('fldTitle').focus();
}

function clearUpload() {
  chosenFile = null;
  document.getElementById('uploadForm').style.display = 'none';
  document.getElementById('fileInput').value = '';
  document.getElementById('progressWrap').classList.remove('visible');
}

async function startUpload() {
  if (!chosenFile) return;
  const { scope, grade, section, subject } = scopeCfg();
  const title = document.getElementById('fldTitle').value.trim();
  if (!title) { toast('Please enter a display title', 'err'); return; }

  document.getElementById('btnUpload').disabled = true;
  document.getElementById('progressWrap').classList.add('visible');
  setProgress(0, 'Requesting upload URL…');

  const meta = await callEdge({
    action:    'get_upload_url',
    title,
    filename:  chosenFile.name,
    mime_type: chosenFile.type || null,
    size_bytes: chosenFile.size,
    scope,
    grade,
    section,
    subject,
  });
  if (!meta) { resetUploadBtn(); return; }

  setProgress(15, 'Uploading to cloud…');

  try {
    await uploadWithProgress(meta.upload_url, chosenFile);
  } catch (e) {
    toast(`Upload failed: ${e.message}`, 'err');
    resetUploadBtn(); return;
  }

  setProgress(95, 'Confirming…');

  const confirmed = await callEdge({ action: 'confirm_upload', file_id: meta.file_id });
  if (!confirmed) { resetUploadBtn(); return; }

  setProgress(100, 'Upload complete ✓');
  toast('File uploaded successfully', 'ok');
  setTimeout(() => { clearUpload(); }, 1200);
  resetUploadBtn();
}

function uploadWithProgress(url, file) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('PUT', url);
    xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const pct = 15 + Math.round((e.loaded / e.total) * 80);
        setProgress(pct, `Uploading… ${fmtBytes(e.loaded)} / ${fmtBytes(e.total)}`);
      }
    };
    xhr.onload  = () => (xhr.status < 300 ? resolve() : reject(new Error(`HTTP ${xhr.status}`)));
    xhr.onerror = () => reject(new Error('Network error'));
    xhr.send(file);
  });
}

function setProgress(pct, label) {
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}

function resetUploadBtn() {
  document.getElementById('btnUpload').disabled = false;
}

// ─────────────────────────────────────────────────────────────────────────────
//  File listing
// ─────────────────────────────────────────────────────────────────────────────
function debounceSearch() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => loadFiles(1), 400);
}

async function loadFiles(page = 1) {
  currentPage = page;
  const { scope, grade, section, subject } = scopeCfg();
  const search        = document.getElementById('searchInput').value.trim() || undefined;
  const statusFilter  = document.getElementById('filterStatus').value;
  const upload_status = statusFilter !== '' ? Number(statusFilter) : undefined;

  const grid = document.getElementById('fileGrid');
  grid.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:20px 0">Loading…</div>';

  const data = await callEdge({
    action: 'list',
    scope:  scope || undefined,
    grade:  grade || undefined,
    section: section || undefined,
    subject: subject || undefined,
    upload_status,
    search,
    page,
    per_page: 20,
    sort_by: 'created_at',
    sort_order: 'desc',
  });

  if (!data) { grid.innerHTML = ''; return; }

  if (!data.files.length) {
    grid.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <p>No files found</p>
      </div>`;
    document.getElementById('paginationBar').innerHTML = '';
    return;
  }

  grid.innerHTML = data.files.map(f => `
    <div class="file-card">
      <div class="file-card-header">
        <div class="file-icon">${fileIcon(f.mime_type)}</div>
        <div style="flex:1;min-width:0">
          <div class="file-title">${escHtml(f.title)}</div>
          <div class="file-meta">${fmtBytes(f.size_bytes)} · ${fmtDate(f.created_at)}</div>
        </div>
      </div>
      <div class="file-tags">
        ${f.scope === 'private'  ? '<span class="tag">🔒 private</span>' : ''}
        ${f.scope === 'common'   ? `<span class="tag">📚 grade ${f.grade} · common</span>` : ''}
        ${f.scope === 'section'  ? `<span class="tag">📂 ${f.grade}-${f.section} · ${f.subject}</span>` : ''}
        ${f.mime_type ? `<span class="tag">${f.mime_type.split('/')[1] || f.mime_type}</span>` : ''}
        <span class="tag">
          <span class="status-dot ${f.upload_status === 1 ? 'dot-done' : 'dot-pending'}"></span>
          ${f.upload_status === 1 ? 'ready' : 'pending'}
        </span>
      </div>
      <div class="file-meta">↑ ${escHtml(f.teacher_name)}</div>
      <div class="file-actions">
        ${f.upload_status === 1 ? `<button class="btn btn-ghost btn-sm" onclick="downloadFile('${f.id}')">↓ Download</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="openRename('${f.id}', '${escHtml(f.title).replace(/'/g,"\\'")}')">✎ Rename</button>
        <button class="btn btn-danger btn-sm" onclick="deleteFile('${f.id}')">✕</button>
      </div>
    </div>
  `).join('');

  const { page: pg, total_pages: total } = data.pagination;
  const bar = document.getElementById('paginationBar');
  if (total <= 1) { bar.innerHTML = ''; return; }
  bar.innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="loadFiles(${pg - 1})" ${pg <= 1 ? 'disabled' : ''}>← Prev</button>
    <span>Page ${pg} of ${total}</span>
    <button class="btn btn-ghost btn-sm" onclick="loadFiles(${pg + 1})" ${pg >= total ? 'disabled' : ''}>Next →</button>
  `;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Download
// ─────────────────────────────────────────────────────────────────────────────
async function downloadFile(fileId) {
  toast('Generating download link…', 'info');
  const data = await callEdge({ action: 'get_download_url', file_id: fileId });
  if (!data) return;
  window.open(data.download_url, '_blank');
  toast('Download link opened in new tab', 'ok');
}

// ─────────────────────────────────────────────────────────────────────────────
//  Rename
// ─────────────────────────────────────────────────────────────────────────────
function openRename(fileId, currentTitle) {
  renameFileId = fileId;
  document.getElementById('renameInput').value = currentTitle;
  const modal = document.getElementById('renameModal');
  modal.style.display = 'flex';
  setTimeout(() => document.getElementById('renameInput').focus(), 50);
}
function closeRename() {
  document.getElementById('renameModal').style.display = 'none';
  renameFileId = null;
}
async function confirmRename() {
  const newTitle = document.getElementById('renameInput').value.trim();
  if (!newTitle) { toast('Title cannot be empty', 'err'); return; }
  const data = await callEdge({ action: 'rename', file_id: renameFileId, new_title: newTitle });
  if (!data) return;
  toast('File renamed', 'ok');
  closeRename();
  loadFiles(currentPage);
}
document.getElementById('renameModal').addEventListener('click', function(e) {
  if (e.target === this) closeRename();
});

// ─────────────────────────────────────────────────────────────────────────────
//  Delete
// ─────────────────────────────────────────────────────────────────────────────
async function deleteFile(fileId) {
  if (!confirm('Delete this file? This cannot be undone.')) return;
  const data = await callEdge({ action: 'delete', file_id: fileId });
  if (!data) return;
  toast('File deleted', 'ok');
  loadFiles(currentPage);
}

// ─────────────────────────────────────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────────────────────────────────────
updateSessionUI();
</script>
